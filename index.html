<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>In-Sight Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121828;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      text-align: center;
    }

    .chat-box {
      background: #0F1524;
      border-radius: 20px;
      padding: 20px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 15px;
      text-align: left;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #08F382;
      color: #0B1320;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .message {
      margin-bottom: 10px;
    }

    .user {
      color: #08F382;
    }

    .assistant {
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>In-Sight Chat</h1>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Haz una pregunta..." />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
  async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    const userText = input.value;
    if (!userText) return;

    chatBox.innerHTML += `<div class="message user">Tú: ${userText}</div>`;
    input.value = "";

    const loadingId = "loading-" + Date.now();
    chatBox.innerHTML += `<div class="message assistant" id="${loadingId}">Asistente: escribiendo...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userText })
      });

      const data = await response.json();

      document.getElementById(loadingId).innerHTML =
        `<div class="message assistant">Asistente: ${data.reply}</div>`;
    } catch (error) {
      document.getElementById(loadingId).innerHTML =
        `<div class="message assistant">Asistente: Hubo un error al responder.</div>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
</body>
</html>
